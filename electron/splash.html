<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FocusPie Starting...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #050a18;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      border-radius: 12px;
      /* Allow dragging the splash window */
      -webkit-app-region: drag;
    }
    
    .logo-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
    }

    .logo-bg {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: linear-gradient(135deg, #3B82F6, #C9FFED);
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .pulse {
      position: absolute;
      inset: -10px;
      border-radius: 30px;
      background: rgba(59, 130, 246, 0.3);
      z-index: 1;
      animation: pulse 2s infinite;
    }

    .icon {
      width: 40px;
      height: 40px;
      color: white;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    p {
      margin: 0;
      font-size: 13px;
      color: #94a3b8;
    }

    .spinner {
      margin-top: 30px;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 1; }
      100% { transform: scale(1.3); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="pulse"></div>
    <div class="logo-bg">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
      </svg>
    </div>
  </div>
  
  <h1>FocusPie</h1>
  <p>Starting local server...</p>
  
  <div class="spinner"></div>
</body>
</html>
