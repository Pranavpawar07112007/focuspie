<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FocusPie Starting...</title>
  <style>
    :root {
      --brand-blue: #3B82F6;
      --brand-emerald: #10B981;
      --brand-purple: #8B5CF6;
      --brand-rose: #F43F5E;
      --bg-color: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
    }
    
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Beautiful animated background */
    .bg-animation {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      overflow: hidden;
      background-color: #f8fafc;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.2;
      animation: float 10s ease-in-out infinite alternate;
      mix-blend-mode: multiply;
    }

    .orb-1 {
      width: 50vw; height: 50vw;
      background: var(--brand-blue);
      top: -20%; left: -10%;
      animation-delay: 0s;
    }
    
    .orb-2 {
      width: 45vw; height: 45vw;
      background: var(--brand-purple);
      top: 20%; right: -15%;
      animation-delay: -2s;
    }

    .orb-3 {
      width: 40vw; height: 40vw;
      background: var(--brand-emerald);
      bottom: -20%; left: 10%;
      animation-delay: -4s;
    }

    .orb-4 {
      width: 35vw; height: 35vw;
      background: var(--brand-rose);
      bottom: 10%; right: -10%;
      animation-delay: -6s;
    }

    .orb-5 {
      width: 30vw; height: 30vw;
      background: #FBBF24; /* Yellow */
      top: 50%; left: 50%;
      animation-delay: -8s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      33% { transform: translate(10vw, -10vh) scale(1.3) rotate(15deg); }
      66% { transform: translate(-10vw, 15vh) scale(0.8) rotate(-10deg); }
      100% { transform: translate(-15vw, -15vh) scale(1.2) rotate(5deg); }
    }

    /* Main Container (Glassmorphism) */
    .container {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 32px;
      padding: 60px 50px;
      width: 380px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .logo-wrapper {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 30px auto;
    }

    .logo-bg {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: linear-gradient(135deg, #3B82F6, #C9FFED);
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .pulse {
      position: absolute;
      inset: -10px;
      border-radius: 36px;
      background: rgba(59, 130, 246, 0.2);
      z-index: 1;
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    .icon {
      width: 40px;
      height: 40px;
      color: white;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text-main);
      margin-bottom: 12px;
    }

    p#status-text {
      margin: 0;
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Loader */
    .loader-track {
      width: 100%;
      height: 6px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 6px;
      margin-top: 32px;
      overflow: hidden;
      position: relative;
    }

    .loader-fill {
      position: absolute;
      top: 0; bottom: 0; left: 0;
      width: 40%;
      background: linear-gradient(90deg, transparent, var(--brand-blue), transparent);
      border-radius: 6px;
      animation: shimmer 1.5s infinite linear;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }

    /* Error State */
    .error-container {
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .error-container.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 1;
    }

    .error-icon {
      width: 56px;
      height: 56px;
      color: var(--brand-rose);
      margin-bottom: 20px;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .error-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-main);
      margin: 0 0 12px 0;
    }

    .error-message {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
      margin: 0 0 28px 0;
      background: rgba(244, 63, 94, 0.05);
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(244, 63, 94, 0.2);
      max-height: 100px;
      overflow-y: auto;
      text-align: left;
      width: 100%;
      box-sizing: border-box;
    }

    .btn-quit {
      background: var(--brand-rose);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3);
    }

    .btn-quit:hover {
      background: #e11d48;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(244, 63, 94, 0.4);
    }

  </style>
</head>
<body>

  <div class="bg-animation">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="orb orb-5"></div>
  </div>

  <div class="container" id="main-card">
    
    <!-- Loading State -->
    <div id="loading-state">
      <div class="logo-wrapper">
        <div class="pulse"></div>
        <div class="logo-bg">
          <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
          </svg>
        </div>
      </div>
      
      <h1>FocusPie</h1>
      <p id="status-text">Waking up local server...</p>
      
      <div class="loader-track">
        <div class="loader-fill"></div>
      </div>
    </div>

    <!-- Error State -->
    <div id="error-state" class="error-container">
      <svg class="error-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
      <h2 class="error-title">Startup Failed</h2>
      <div class="error-message" id="error-text">Unknown error occurred.</div>
      <button class="btn-quit" id="quit-btn">Quit FocusPie</button>
    </div>

  </div>

  <script>
    const loadingState = document.getElementById('loading-state');
    const errorState = document.getElementById('error-state');
    const errorText = document.getElementById('error-text');
    const quitBtn = document.getElementById('quit-btn');
    const mainCard = document.getElementById('main-card');
    const statusText = document.getElementById('status-text');

    // Simulate progress text
    const statusMessages = [
      "Waking up local server...",
      "Loading ML models...",
      "Connecting to database...",
      "Almost ready..."
    ];
    let msgIndex = 0;
    const interval = setInterval(() => {
      msgIndex = (msgIndex + 1) % statusMessages.length;
      statusText.innerText = statusMessages[msgIndex];
    }, 3000);

    // Listen for error IPC
    if (window.electronAPI) {
      window.electronAPI.onStartupError((message) => {
        clearInterval(interval);
        
        // Hide loading
        loadingState.style.display = 'none';
        
        // Adjust container style for error
        mainCard.style.borderColor = 'rgba(244, 63, 94, 0.2)';
        
        // Show error
        errorText.innerText = message;
        errorState.classList.add('active');
      });

      quitBtn.addEventListener('click', () => {
        window.electronAPI.quitApp();
      });
    }
  </script>
</body>
</html>
